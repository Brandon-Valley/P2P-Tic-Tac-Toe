<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f4f0e6">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>P2P Tic-Tac-Toe</title>
  <style>
    html,body{margin:0;min-height:100%;background:#f4f0e6;color:#151515;font-family:system-ui,-apple-system,sans-serif}
    body{display:grid;place-items:center;padding:24px;box-sizing:border-box;text-align:center}
    .loading{font-weight:800;letter-spacing:.04em}
    .error{max-width:34rem;line-height:1.5}
    button{border:2px solid #151515;border-radius:999px;background:#fffdfa;padding:10px 18px;font:inherit;font-weight:800}
  </style>
</head>
<body>
  <div id="status" class="loading">Opening P2P Tic-Tac-Toe...</div>
  <script>
  (async () => {
    try {
      const files = Array.from({length: 8}, (_, i) => `runtime/quit-confirm-v5-${String(i + 1).padStart(2, '0')}.txt?v=9`);
      const parts = await Promise.all(files.map(async file => {
        const response = await fetch(file, {cache: 'no-store'});
        if (!response.ok) throw new Error(`Could not load ${file}`);
        return response.text();
      }));

      const binary = atob(parts.join(''));
      const bytes = Uint8Array.from(binary, char => char.charCodeAt(0));
      let html = new TextDecoder().decode(bytes);

      html = html.replaceAll('Threefold — P2P Tic-Tac-Toe', 'P2P Tic-Tac-Toe');
      html = html.replaceAll('THREEFOLD', 'P2P TIC-TAC-TOE');
      html = html.replaceAll('Threefold', 'P2P Tic-Tac-Toe');
      html = html.replaceAll('Game link or room code', 'Game link');
      html = html.replace(/\.scan-line\{([^}]*)border-bottom:1\.5px solid var\(--line\)([^}]*)\}/, (_, before, after) => `.scan-line{${before}${after}}`);
      html = html.replace(/<body data-build="[^"]*"/, '<body data-build="2026-07-09-p2p-tic-tac-toe-v9"');
      html = html.replace(
        '</style>',
        '.scan-line .text-button{text-decoration:none!important}.local-search,.nearby-auto-status{display:none!important}</style>'
      );

      document.open();
      document.write(html);
      document.close();
    } catch (error) {
      document.body.innerHTML = `<div class="error"><h1>Could not open P2P Tic-Tac-Toe</h1><p>${error.message || 'The game could not be loaded.'}</p><button type="button" onclick="location.reload()">Try again</button></div>`;
    }
  })();
  </script>
</body>
</html>
