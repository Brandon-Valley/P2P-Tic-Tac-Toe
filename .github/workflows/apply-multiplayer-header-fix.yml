name: Apply multiplayer header fix

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/apply-multiplayer-header-fix.yml

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Patch index.html
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import hashlib

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")

          def replace_once(old, new, label):
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected 1 match, found {count}")
              text = text.replace(old, new, 1)

          replace_once(
              "    #leaveGameBtn,.menu-back{height:40px;display:inline-flex;align-items:center;justify-content:center;gap:7px;border:2px solid var(--ink);background:#fffdfa;border-radius:999px;padding:0 12px 0 9px;box-shadow:0 3px 0 rgba(21,21,21,.14);font-size:.7rem;font-weight:950;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}\n",
              "    #leaveGameBtn,.menu-back{height:40px;display:inline-flex;align-items:center;justify-content:center;gap:7px;border:2px solid var(--ink);background:#fffdfa;border-radius:999px;padding:0 12px 0 9px;box-shadow:0 3px 0 rgba(21,21,21,.14);font-size:.7rem;font-weight:950;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}\n    #leaveGameBtn{width:clamp(64px,22vw,92px);min-width:64px;max-width:92px;gap:clamp(3px,1.2vw,7px);padding:0 clamp(7px,2vw,12px) 0 clamp(6px,1.8vw,9px);font-size:clamp(.58rem,2.8vw,.7rem)}\n",
              "responsive menu width",
          )

          replace_once(
              "    #leaveGameBtn .menu-arrow,.menu-back .menu-arrow{width:18px;height:18px;display:grid;place-items:center;background:transparent;box-shadow:none;line-height:1}\n",
              "    #leaveGameBtn .menu-arrow,.menu-back .menu-arrow{width:18px;height:18px;display:grid;place-items:center;background:transparent;box-shadow:none;line-height:1}\n    #leaveGameBtn .menu-arrow{width:clamp(14px,4vw,18px);height:clamp(14px,4vw,18px);flex:0 0 auto}\n",
              "responsive menu arrow",
          )

          replace_once(
              "    #leaveGameBtn .menu-arrow svg,.menu-back .menu-arrow svg{display:block;width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}\n",
              "    #leaveGameBtn .menu-arrow svg,.menu-back .menu-arrow svg{display:block;width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}\n    #leaveGameBtn .menu-arrow svg{width:100%;height:100%}\n",
              "responsive menu arrow icon",
          )

          replace_once(
              "    .game-status{text-align:center;min-height:30px;font-family:Georgia,serif;font-size:1.08rem;font-weight:700;display:flex;align-items:center;justify-content:center}\n",
              "    .game-status{text-align:center;min-height:30px;font-family:Georgia,serif;font-size:1.08rem;font-weight:700;display:flex;align-items:center;justify-content:center}\n    .game-status .turn-owner{font-weight:900}\n    .game-status .turn-owner.x{color:var(--coral)}\n    .game-status .turn-owner.o{color:#20a978}\n",
              "turn owner colors",
          )

          replace_once(
              "        <span id=\"gameConnection\" hidden aria-hidden=\"true\"></span>\n",
              "",
              "connection status element",
          )

          replace_once(
              "      <div class=\"game-status\" id=\"gameStatus\">Your turn.</div>\n",
              "      <div class=\"game-status\" id=\"gameStatus\"><span class=\"turn-owner x\">Your</span>&nbsp;turn.</div>\n",
              "initial turn status",
          )

          replace_once(
              "    $('#gameConnection').hidden = true;\n",
              "",
              "single-player connection status",
          )

          replace_once(
              "  function updateStatus() {\n    const el = $('#gameStatus');\n    if (winner === 'draw') el.textContent = 'A perfect draw.';\n    else if (winner) el.textContent = winner === localMark() ? 'You found three.' : 'They found three.';\n    else if (mode === 'single') el.textContent = turn === 'X' ? 'Your turn.' : 'The CPU is thinking…';\n    else if (!conn?.open) el.textContent = 'Reconnecting…';\n    else el.textContent = canLocalMove() ? 'Your turn.' : 'Their turn.';\n  }\n",
              "  function updateStatus() {\n    const el = $('#gameStatus');\n    const setTurnStatus = (owner, mark) => {\n      el.innerHTML = `<span class=\"turn-owner ${mark.toLowerCase()}\">${owner}</span>&nbsp;turn.`;\n    };\n    if (winner === 'draw') el.textContent = 'A perfect draw.';\n    else if (winner) el.textContent = winner === localMark() ? 'You found three.' : 'They found three.';\n    else if (mode === 'single') {\n      if (turn === 'X') setTurnStatus('Your', 'X');\n      else el.textContent = 'The CPU is thinking…';\n    }\n    else if (!conn?.open) el.textContent = 'Reconnecting…';\n    else {\n      const mine = localMark();\n      const localTurn = canLocalMove();\n      const statusMark = localTurn ? mine : (mine === 'X' ? 'O' : 'X');\n      setTurnStatus(localTurn ? 'Your' : 'Their', statusMark);\n    }\n  }\n",
              "turn status logic",
          )

          replace_once(
              "      $('#xName').textContent='You'; $('#oName').textContent='Friend'; $('#gameConnection').hidden=false; $('#gameConnection').innerHTML='<span class=\"connection-dot online\"></span>Peer connected';\n",
              "      $('#xName').textContent='You'; $('#oName').textContent='Them';\n",
              "host player labels",
          )

          replace_once(
              "        conn.on('open',()=>{ clearTimeout(timeout); $('#xName').textContent='Friend'; $('#oName').textContent='You'; $('#gameConnection').hidden=false; $('#gameConnection').innerHTML='<span class=\"connection-dot online\"></span>Peer connected'; show('game'); tone(660,.12,'triangle',.04); });\n",
              "        conn.on('open',()=>{ clearTimeout(timeout); $('#xName').textContent='Them'; $('#oName').textContent='You'; show('game'); tone(660,.12,'triangle',.04); });\n",
              "guest player labels",
          )

          replace_once(
              "    $('#gameConnection').innerHTML='<span class=\"connection-dot\"></span>Disconnected'; updateStatus(); toast('The other player disconnected.');\n",
              "    updateStatus(); toast('The other player disconnected.');\n",
              "disconnect status",
          )

          encoded = text.encode("utf-8")
          blob_sha = hashlib.sha1(f"blob {len(encoded)}\\0".encode() + encoded).hexdigest()
          expected = "db8f988244a9338bc37165e2fbeb3777fd3ec0b8"
          if blob_sha != expected:
              raise SystemExit(f"Patched file hash mismatch: {blob_sha} != {expected}")

          path.write_text(text, encoding="utf-8")
          print(f"Verified patched index.html blob {blob_sha}")
          PY

      - name: Commit index.html to master
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Fix multiplayer header layout"
          git push origin HEAD:master
