name: Apply UI copy and icon updates

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/apply-ui-copy-and-icons.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Apply tested index patch
        shell: bash
        run: |
          printf '%s' '' | base64 -d | gzip -d > /tmp/index.patch
          git apply --check /tmp/index.patch
          git apply /tmp/index.patch

      - name: Validate and publish
        shell: bash
        run: |
          grep -q 'Waiting for<br>other player.' index.html
          grep -q 'Ask your friend to send you the game link.' index.html
          grep -q 'class="choice-icon"' index.html
          rm -f .github/workflows/apply-ui-copy-and-icons.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/apply-ui-copy-and-icons.yml
          git commit -m "Refine menu icons and multiplayer copy"
          git push origin HEAD:master
