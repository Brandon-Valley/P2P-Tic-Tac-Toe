name: Apply quit confirmation

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/apply-quit-confirmation.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Apply tested patch
        shell: bash
        run: |
          printf '%s' '' | base64 -d | gzip -d > /tmp/index.patch
          git apply --check /tmp/index.patch
          git apply /tmp/index.patch

      - name: Validate and publish
        shell: bash
        run: |
          grep -q 'id="quitConfirm"' index.html
          grep -q 'Send your friend this link or ask them to scan this QR code.' index.html
          grep -q 'rule wait-rule' index.html
          rm -f .github/workflows/apply-quit-confirmation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/apply-quit-confirmation.yml
          git commit -m "Confirm before quitting active games"
          git push origin HEAD:master

# Trigger after workflow registration.
